name: Enterprise CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Prevent build storms on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Language (Example: Go)
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build and Test
        run: |
          go build ./...
          go test -race ./...

      - name: Security Scan (Gosec)
        run: |
          # Professional-grade security gate
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
